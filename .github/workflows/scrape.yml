name: Scrape & Deploy

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install curl (for SEBI WAF bypass)
        run: sudo apt-get update && sudo apt-get install -y curl

      - name: Run scraper
        run: python3 scrape_to_json.py
        timeout-minutes: 40
        env:
          CLOUD: '1'

      - name: Check output
        run: |
          ls -la docs/data.json
          python3 -c "import json; d=json.load(open('docs/data.json')); print(f'Sources: {d[\"total_sources\"]}, Docs: {d[\"total_documents\"]}, OK: {d[\"sources_ok\"]}, Errors: {d[\"sources_error\"]}')"

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet && echo "No changes" || git commit -m "Update scraped data $(date -u +%Y-%m-%d\ %H:%M)" && git push
