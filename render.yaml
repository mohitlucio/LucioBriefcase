services:
  - type: web
    name: lucio-briefcase
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python backend/server.py
    envVars:
      - key: CLOUD
        value: "1"
      - key: PORT
        value: "8765"
      - key: PYTHON_VERSION
        value: "3.11.0"
