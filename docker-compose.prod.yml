version: "3.9"

services:
  luciobriefcase:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: luciobriefcase
    restart: unless-stopped
    environment:
      CLOUD: "1"
      PYTHONUNBUFFERED: "1"
      AUTO_SCRAPE_ON_START: "1"
      FETCH_TIMEOUT: "25"
      URLOPEN_TIMEOUT: "60"
      SCRAPER_TIMEOUT: "1800"
      SCRAPE_TIMEOUT: "600"
      DOWNLOAD_DIR: "/data/Repositories"
      PORT: "10000"
    expose:
      - "10000"
    volumes:
      - repositories_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:10000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  caddy:
    image: caddy:2.8
    container_name: luciobriefcase-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - luciobriefcase

volumes:
  repositories_data:
  caddy_data:
  caddy_config:
